<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title">Revita Biotec | 联系我们</title>
    <meta
      name="description"
      content="通过邮箱、电话或地址联系 Revita Biotec，获取合作与咨询渠道。"
      data-i18n="description"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <header class="site-header">
      <div class="container nav-bar">
        <a class="brand" href="index.html">Revita Biotec</a>
        <nav class="nav-links">
          <div class="nav-item">
            <span class="nav-link nav-link--trigger" data-i18n="nav.about">瑞维塔介绍</span>
            <div class="dropdown-menu">
              <a href="business-model.html" data-i18n="nav.about.businessModel">业务模式</a>
              <a href="founder.html" data-i18n="nav.about.founder">创始人介绍</a>
              <a href="patent.html" data-i18n="nav.about.patent">专利技术</a>
              <a href="research-direction.html" data-i18n="nav.about.research">研发方向</a>
            </div>
          </div>
          <a class="nav-link" href="research.html" data-i18n="nav.products">产品中心</a>
          <a class="nav-link" href="latest.html" data-i18n="nav.news">最新动态</a>
          <a class="nav-link" href="contact.html" data-i18n="nav.contact">联系我们</a>
          <a class="nav-link" href="faq.html" data-i18n="nav.faq">常见问题</a>
        </nav>
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <main>
      <section class="contact-hero">
        <div class="container">
          <h1 data-i18n="contact.hero.title">联系我们</h1>
          <p class="subtitle" data-i18n="contact.hero.subtitle">CONTACT US</p>
        </div>
      </section>

      <section class="contact-content">
        <div class="container contact-layout">
          <div class="contact-info">
            <h2 data-i18n="contact.company.name">上海瑞维塔生物科技有限公司</h2>
            <div class="divider"></div>
            
            <div class="contact-item">
              <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <div>
                <p class="label" data-i18n="contact.phone.label">电话</p>
                <p data-i18n="contact.phone.value">+86 021 5888 8888</p>
              </div>
            </div>

            <div class="contact-item">
              <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <div>
                <p class="label" data-i18n="contact.email.label">邮箱</p>
                <p data-i18n="contact.email.value">hello@revita-biotec.com</p>
              </div>
            </div>

            <div class="contact-item">
              <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <div>
                <p class="label" data-i18n="contact.address.label">地址</p>
                <p data-i18n="contact.address.value">上海市浦东新区张江高科技园区</p>
              </div>
            </div>

            <div class="wechat-qr">
              <img src="images/qr-wechat.jpg" alt="企业微信" data-i18n="contact.wechat.alt"/>
              <p data-i18n="contact.wechat.label">企业微信</p>
            </div>
          </div>

          <div class="map-placeholder">
            <div class="map-container">
              <div class="map-content">
                <svg class="map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                <p data-i18n="contact.map.placeholder">地图嵌入区域</p>
              </div>
            </div>
            <p class="map-copyright" data-i18n="contact.map.copyright">© 2026 Baidu Maps</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p data-i18n="footer.text">© 2026 Revita Biotec。专注抗衰老与皮肤修复科研。</p>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
