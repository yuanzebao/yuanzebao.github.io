<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title">Revita Biotec | 联系我们</title>
    <meta name="description" content="通过邮箱、电话或地址联系 Revita Biotec，获取合作与咨询渠道。" data-i18n="description" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <header class="site-header">
      <div class="container nav-bar">
        <div class="nav-left">
          <a class="brand" href="index.html">
            <img src="images/logo.png" alt="Revita Biotec" class="brand-logo" />
          </a>
        </div>
        
        <div class="nav-center">
          <nav class="nav-links">
            <div class="nav-item">
              <span class="nav-link nav-link--trigger" data-i18n="nav.about">瑞维塔介绍</span>
              <div class="dropdown-menu">
                <a href="business-model.html" data-i18n="nav.about.businessModel">业务模式</a>
                <a href="founder.html" data-i18n="nav.about.founder">核心团队</a>
              </div>
            </div>
            <a class="nav-link" href="research-direction.html" data-i18n="nav.tech">技术平台</a>
            <a class="nav-link" href="research.html" data-i18n="nav.products">产品中心</a>
            <a class="nav-link" href="latest.html" data-i18n="nav.news">联系我们</a>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <section class="contact-hero">
        <div class="container">
          <h1 data-i18n="contact.hero.title">联系我们</h1>
          <p class="subtitle" data-i18n="contact.hero.subtitle">CONTACT US</p>
        </div>
      </section>

      <section class="contact-content">
        <div class="container contact-layout">
          <div class="contact-info">
            <h2 data-i18n="contact.company.name">上海瑞维塔生物科技有限公司</h2>
            <div class="divider"></div>
            
            <div class="contact-item">
              <span class="contact-icon">📞</span>
              <div>
                <p class="label" data-i18n="contact.phone.label">电话</p>
                <p data-i18n="contact.phone.value">+86 021 5888 8888</p>
              </div>
            </div>

            <div class="contact-item">
              <span class="contact-icon">📧</span>
              <div>
                <p class="label" data-i18n="contact.email.label">邮箱</p>
                <p data-i18n="contact.email.value">2449703904@qq.com</p>
              </div>
            </div>

            <div class="contact-item">
              <span class="contact-icon">📍</span>
              <div>
                <p class="label" data-i18n="contact.address.label">地址</p>
                <p data-i18n="contact.address.value">上海市浦东新区张江高科技园区</p>
              </div>
            </div>

            <div class="wechat-qr">
              <p class="label" data-i18n="contact.wechat.label">企业微信</p>
              <img src="images/wechat-qr.jpg" alt="企业微信" data-i18n="contact.wechat.alt" />
              <p data-i18n="contact.wechat.label">企业微信</p>
            </div>
          </div>

          <div class="map-placeholder">
            <div class="map-container">
              <div class="map-content">
                <span class="map-icon">🗺️</span>
                <p data-i18n="contact.map.placeholder">地图嵌入区域</p>
              </div>
            </div>
            <p class="map-copyright" data-i18n="contact.map.copyright">© 2026 百度地图</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p data-i18n="footer.text">© 2026 Revita Biotec。专注抗衰老与皮肤修复科研。</p>
      </div>
    </footer>

    <div class="cookie-consent" id="cookieConsent">
      <div class="cookie-content">
        <p data-i18n="cookie.message">我们使用Cookie来提升您的浏览体验。</p>
        <div class="cookie-actions">
          <button class="cookie-btn cookie-accept" data-i18n="cookie.accept">接受</button>
          <button class="cookie-btn cookie-reject" data-i18n="cookie.reject">拒绝</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
